version: 2

models:
  - name: dim_customer
    description: "Dimensão cliente, unindo Customer e Person"
    columns:
      - name: customer_id
        data_tests: [unique, not_null]

  - name: dim_product
    description: "Dimensão produto"
    columns:
      - name: product_id
        data_tests: [unique, not_null]

  - name: dim_territory
    description: "Dimensão território de vendas"
    columns:
      - name: territory_id
        data_tests: [unique, not_null]

  - name: dim_date
    description: "Dimensão calendário, gerada via generate_series"
    columns:
      - name: date_day
        data_tests: [unique, not_null]

  - name: fct_sales
    description: "Fato de vendas, grão de linha de pedido"
    columns:
      - name: sales_order_detail_id
        data_tests: [unique, not_null]
      - name: customer_id
        data_tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_id
      - name: product_id
        data_tests:
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: territory_id
        data_tests:
          - relationships:
              to: ref('dim_territory')
              field: territory_id
